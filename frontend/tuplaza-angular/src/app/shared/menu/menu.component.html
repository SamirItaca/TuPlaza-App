  </ion-header>

  <ion-content class="menu-content">
    <ion-list>

      <ion-item routerLink="/mi-perfil" routerLinkActive="active-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>

      </ion-item>

      <ion-item routerLink="/configuracion" routerLinkActive="active-item">
        <ion-icon name="settings-outline" slot="start"></ion-icon>

      <ion-item routerLink="/info-error" routerLinkActive="active-item">

    </ion-list>
