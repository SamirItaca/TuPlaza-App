<div class="near-sites-wrapper">
  <h2 class="section-title">Sitios cercanos a ti</h2>
  
  <div class="sites-grid">
    <div class="site-card" *ngFor="let i of [1,2,3,4]">
      <div class="img-container">
        <img src="assets/img/garaje-placeholder.jpg" alt="Garaje">
      </div>
      <div class="card-info">
        <div class="text-group">
          <span class="direccion">Dirección del sitio</span>
          <span class="dimensiones">Dimensiones 100x100</span>
        </div>
        <button class="btn-ver-ahora">Ver ahora</button>
      </div>
    </div>
  </div>
</div>
